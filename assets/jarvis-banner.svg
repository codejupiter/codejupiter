<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" width="1280" height="360" role="img" aria-label="Zoriah Cocio - JARVIS-style profile banner">
  <defs>
    <!-- Gradients -->
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a1929"/>
      <stop offset="60%" stop-color="#020812"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>

    <linearGradient id="cyan-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d9ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00d9ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00d9ff" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#a8e8ff"/>
      <stop offset="100%" stop-color="#00d9ff"/>
    </linearGradient>

    <radialGradient id="reactor-glow">
      <stop offset="0%" stop-color="#88e8ff" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#00d9ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00d9ff" stop-opacity="0"/>
    </radialGradient>

    <!-- Filters -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="glow-strong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Patterns -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00d9ff" stroke-width="0.4" opacity="0.15"/>
    </pattern>

    <pattern id="grid-fine" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M 10 0 L 0 0 0 10" fill="none" stroke="#00d9ff" stroke-width="0.2" opacity="0.08"/>
    </pattern>

    <!-- Reactor symbol -->
    <symbol id="reactor" viewBox="-100 -100 200 200">
      <circle r="80" fill="none" stroke="#00d9ff" stroke-width="0.8" opacity="0.4"/>
      <circle r="65" fill="none" stroke="#00d9ff" stroke-width="0.6" opacity="0.5" stroke-dasharray="4 2"/>
      <circle r="50" fill="none" stroke="#00d9ff" stroke-width="1" opacity="0.7"/>
      <circle r="35" fill="url(#reactor-glow)" opacity="0.8"/>
      <circle r="20" fill="none" stroke="#88e8ff" stroke-width="1.5" opacity="0.9"/>
      <circle r="8" fill="#aaf0ff" opacity="0.95"/>
      <!-- Triangular segments -->
      <g stroke="#00d9ff" stroke-width="1" opacity="0.7" fill="none">
        <path d="M 0 -50 L -10 -32 L 10 -32 Z"/>
        <path d="M 0 50 L -10 32 L 10 32 Z"/>
        <path d="M -50 0 L -32 -10 L -32 10 Z"/>
        <path d="M 50 0 L 32 -10 L 32 10 Z"/>
        <path d="M 35 -35 L 22 -28 L 28 -22 Z"/>
        <path d="M -35 -35 L -22 -28 L -28 -22 Z"/>
        <path d="M 35 35 L 22 28 L 28 22 Z"/>
        <path d="M -35 35 L -22 28 L -28 22 Z"/>
      </g>
    </symbol>

    <!-- Scan line -->
    <linearGradient id="scan-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00d9ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00d9ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00d9ff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="360" fill="url(#bg)"/>
  <rect width="1280" height="360" fill="url(#grid-fine)"/>
  <rect width="1280" height="360" fill="url(#grid)"/>

  <!-- Vignette corners -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="60%">
    <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000000" stop-opacity="0.7"/>
  </radialGradient>
  <rect width="1280" height="360" fill="url(#vignette)"/>

  <!-- Scanning beam -->
  <rect x="0" y="0" width="1280" height="80" fill="url(#scan-grad)" opacity="0.6">
    <animate attributeName="y" values="-80;360;-80" dur="6s" repeatCount="indefinite"/>
  </rect>

  <!-- Left HUD: rotating reactor -->
  <g transform="translate(180, 180)">
    <use href="#reactor" width="240" height="240" x="-120" y="-120" filter="url(#glow)">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="40s" repeatCount="indefinite"/>
    </use>
    <!-- Outer rotating ring -->
    <circle r="105" fill="none" stroke="#00d9ff" stroke-width="0.6" opacity="0.4" stroke-dasharray="2 6">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="30s" repeatCount="indefinite"/>
    </circle>
    <!-- Status text around reactor -->
    <text x="-95" y="-115" fill="#00d9ff" font-family="monospace" font-size="9" opacity="0.7">SYS.ONLINE</text>
    <text x="60" y="-115" fill="#00d9ff" font-family="monospace" font-size="9" opacity="0.7">v4.2.6</text>
    <text x="-95" y="125" fill="#00d9ff" font-family="monospace" font-size="9" opacity="0.7">CORE.ACTIVE</text>
    <text x="60" y="125" fill="#00d9ff" font-family="monospace" font-size="9" opacity="0.7">100%</text>
  </g>

  <!-- Right HUD: corner brackets and data -->
  <g transform="translate(1100, 180)" opacity="0.85">
    <!-- Concentric arcs -->
    <circle r="80" fill="none" stroke="#00d9ff" stroke-width="0.5" opacity="0.4" stroke-dasharray="3 5"/>
    <circle r="60" fill="none" stroke="#00d9ff" stroke-width="0.6" opacity="0.5"/>
    <circle r="40" fill="none" stroke="#00d9ff" stroke-width="0.7" opacity="0.7"/>
    <circle r="3" fill="#00d9ff"/>
    <!-- Crosshair -->
    <line x1="-90" y1="0" x2="-50" y2="0" stroke="#00d9ff" stroke-width="0.8" opacity="0.6"/>
    <line x1="50" y1="0" x2="90" y2="0" stroke="#00d9ff" stroke-width="0.8" opacity="0.6"/>
    <line x1="0" y1="-90" x2="0" y2="-50" stroke="#00d9ff" stroke-width="0.8" opacity="0.6"/>
    <line x1="0" y1="50" x2="0" y2="90" stroke="#00d9ff" stroke-width="0.8" opacity="0.6"/>

    <!-- Data tags -->
    <g font-family="monospace" font-size="8" fill="#00d9ff" opacity="0.7">
      <text x="-95" y="-100">TARGET.LOCKED</text>
      <text x="50" y="-100">[ AI/REACT/TS ]</text>
      <text x="-95" y="115">UPLINK.STABLE</text>
      <text x="50" y="115">REGION.AZ-01</text>
    </g>
    <!-- Scanning rotor on outer ring -->
    <g>
      <line x1="0" y1="0" x2="0" y2="-80" stroke="#00d9ff" stroke-width="1.5" opacity="0.8" stroke-linecap="round">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="4s" repeatCount="indefinite"/>
      </line>
    </g>
  </g>

  <!-- Center stack -->
  <g transform="translate(640, 180)" text-anchor="middle">
    <!-- Top tag -->
    <g>
      <line x1="-180" y1="-95" x2="-110" y2="-95" stroke="#00d9ff" stroke-width="0.8" opacity="0.6"/>
      <line x1="110" y1="-95" x2="180" y2="-95" stroke="#00d9ff" stroke-width="0.8" opacity="0.6"/>
      <text y="-92" fill="#00d9ff" font-family="monospace" font-size="11" letter-spacing="4" opacity="0.85">J.A.R.V.I.S // OPERATOR PROFILE</text>
    </g>

    <!-- Name -->
    <text y="-30" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="68" fill="url(#text-grad)" filter="url(#glow-strong)" letter-spacing="2">
      ZORIAH COCIO
    </text>

    <!-- Underline -->
    <line x1="-280" y1="0" x2="280" y2="0" stroke="url(#cyan-grad)" stroke-width="1.5" opacity="0.9"/>
    <circle cx="0" cy="0" r="3" fill="#00d9ff" opacity="0.95"/>

    <!-- Title -->
    <text y="32" font-family="monospace" font-size="14" fill="#a8e8ff" letter-spacing="6" opacity="0.95">
      FRONTEND  ·  FULL-STACK  ·  AI-AUGMENTED
    </text>

    <!-- Sub-tags -->
    <g font-family="monospace" font-size="10" fill="#00d9ff" opacity="0.6" letter-spacing="2">
      <text y="60">[ STREAMING SYSTEMS ]    [ RUNTIME OBSERVABILITY ]    [ DEALER-TECH ]</text>
    </g>

    <!-- Bottom bracket -->
    <g stroke="#00d9ff" stroke-width="1" fill="none" opacity="0.7">
      <path d="M -200 90 L -200 105 L -180 105"/>
      <path d="M 200 90 L 200 105 L 180 105"/>
    </g>
    <text y="103" font-family="monospace" font-size="9" fill="#00d9ff" opacity="0.65" letter-spacing="3">
      TUCSON.AZ  //  github.com/codejupiter  //  STATUS: AVAILABLE
    </text>
  </g>

  <!-- Floating data ticks (decorative) -->
  <g font-family="monospace" font-size="8" fill="#00d9ff" opacity="0.35">
    <text x="40" y="30">&gt; init.boot --hud</text>
    <text x="40" y="44">&gt; load systems_check.exe</text>
    <text x="40" y="58">&gt; auth: codejupiter [OK]</text>
    <text x="40" y="340">&gt; render_pipeline = ACTIVE</text>

    <text x="1090" y="30">&gt; uplink: 1280x360</text>
    <text x="1090" y="44">&gt; fps: 60.0</text>
    <text x="1090" y="58">&gt; latency: 4ms</text>
    <text x="1090" y="340">&gt; status: nominal</text>
  </g>

  <!-- Edge brackets -->
  <g stroke="#00d9ff" stroke-width="1.5" fill="none" opacity="0.7">
    <path d="M 20 20 L 20 50 M 20 20 L 50 20"/>
    <path d="M 1260 20 L 1260 50 M 1260 20 L 1230 20"/>
    <path d="M 20 340 L 20 310 M 20 340 L 50 340"/>
    <path d="M 1260 340 L 1260 310 M 1260 340 L 1230 340"/>
  </g>

  <!-- Pulse dots -->
  <g fill="#00d9ff">
    <circle cx="640" cy="345" r="2">
      <animate attributeName="opacity" values="1;0.2;1" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="650" cy="345" r="2" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.1;0.6" dur="1.6s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="660" cy="345" r="2" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0.05;0.4" dur="1.6s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
