<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Zoriah Cocio Software Engineer profile banner</title>
  <desc id="desc">Dark modern GitHub profile banner with geometric interface lines and software engineering positioning.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/>
      <stop offset="0.42" stop-color="#0B1120"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="154" y1="76" x2="1035" y2="276" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="0.55" stop-color="#22C55E"/>
      <stop offset="1" stop-color="#A3E635"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1000 76) rotate(138) scale(500 260)">
      <stop stop-color="#38BDF8" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" stroke="#94A3B8" stroke-opacity="0.08"/>
    </pattern>
  </defs>

  <rect width="1200" height="360" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="360" rx="28" fill="url(#grid)"/>
  <rect width="1200" height="360" rx="28" fill="url(#glow)"/>

  <path d="M91 92H321L373 144H566" stroke="#38BDF8" stroke-opacity="0.36" stroke-width="2"/>
  <path d="M1028 269H794L741 218H526" stroke="#22C55E" stroke-opacity="0.34" stroke-width="2"/>
  <path d="M848 64H1012L1054 106H1131" stroke="#A3E635" stroke-opacity="0.28" stroke-width="2"/>
  <path d="M66 284H222L260 246H392" stroke="#38BDF8" stroke-opacity="0.22" stroke-width="2"/>

  <g filter="url(#soft)" opacity="0.75">
    <circle cx="980" cy="92" r="74" fill="#0EA5E9" fill-opacity="0.28"/>
    <circle cx="1014" cy="230" r="92" fill="#22C55E" fill-opacity="0.14"/>
  </g>

  <g opacity="0.9">
    <rect x="78" y="58" width="126" height="32" rx="16" fill="#0F172A" stroke="#334155"/>
    <circle cx="101" cy="74" r="5" fill="#22C55E"/>
    <text x="117" y="79" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="12" font-weight="700" letter-spacing="1.2">AVAILABLE</text>
  </g>

  <text x="78" y="156" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="58" font-weight="800" letter-spacing="0">Zoriah Cocio</text>
  <text x="80" y="202" fill="url(#accent)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="25" font-weight="700" letter-spacing="0">Software Engineer / Frontend Engineer / Fullstack Developer</text>
  <text x="80" y="244" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="20" font-weight="500" letter-spacing="0">React - Next.js - TypeScript - Tailwind - Node.js - Product UI</text>

  <g transform="translate(80 278)">
    <rect width="176" height="34" rx="17" fill="#111827" stroke="#263244"/>
    <text x="18" y="22" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" font-weight="700">Production UI</text>
    <rect x="196" width="160" height="34" rx="17" fill="#111827" stroke="#263244"/>
    <text x="214" y="22" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" font-weight="700">Fullstack Apps</text>
    <rect x="376" width="170" height="34" rx="17" fill="#111827" stroke="#263244"/>
    <text x="394" y="22" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" font-weight="700">Clean Systems</text>
  </g>

  <g transform="translate(858 121)">
    <rect width="244" height="138" rx="18" fill="#020617" fill-opacity="0.62" stroke="#334155"/>
    <rect x="20" y="25" width="80" height="10" rx="5" fill="#38BDF8" fill-opacity="0.78"/>
    <rect x="20" y="52" width="202" height="8" rx="4" fill="#64748B" fill-opacity="0.42"/>
    <rect x="20" y="73" width="154" height="8" rx="4" fill="#64748B" fill-opacity="0.32"/>
    <rect x="20" y="102" width="58" height="13" rx="6.5" fill="#22C55E" fill-opacity="0.8"/>
    <rect x="90" y="102" width="58" height="13" rx="6.5" fill="#38BDF8" fill-opacity="0.72"/>
    <rect x="160" y="102" width="42" height="13" rx="6.5" fill="#A3E635" fill-opacity="0.62"/>
  </g>
</svg>
